# Cloud Run service definition for the Google Slides MCP server.
#
# Single-container — per-user OAuth passthrough (no service account).
# Every Google API call runs as the requesting @example.com user.
# Google enforces their existing Drive/Slides permissions on every operation.
#
# DEPLOY: gcloud builds submit --config cloudbuild.yaml --project your-gcp-project --substitutions=SHORT_SHA=$(git rev-parse --short HEAD)

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: google-slides-mcp
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - name: google-slides-mcp
          image: gcr.io/your-gcp-project/google-slides-mcp
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: ALLOWED_DOMAIN
              value: "example.com"
            - name: SERVER_URL
              value: "https://your-service.example.com"
            # Tools — open to all authenticated @example.com users.
            # Per-user OAuth means Google enforces each user's own Drive/Slides
            # permissions on every call. No allowlist needed.
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: slides-oauth-id
                  key: latest
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: slides-oauth-secret
                  key: latest
            # Bulk-operation security alerting.
            # Posts a Slack DM to BULK_OP_ALERT_USER_ID whenever a single call
            # modifies more than BULK_OP_THRESHOLD objects. SLACK_BOT_TOKEN is the
            # Slack bot token — needs `chat:write` only (Slack auto-resolves
            # user IDs to DMs).
            - name: BULK_OP_THRESHOLD
              value: "20"
            - name: BULK_OP_ALERT_USER_ID
              value: "YOUR_SLACK_USER_ID"
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-bot-token
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
            initialDelaySeconds: 10
            periodSeconds: 30
